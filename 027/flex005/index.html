 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <STYLE>
        div.container{
            background-color: beige;
            
            display: flex;
            flex-flow: row  wrap;
            width: 100%;
            height: 100vh;
            
            justify-content: center;
            align-items: center ;            
        }
        div.item{
            background-color: rgb(190, 124, 24);
            border: 1px solid black;
            text-align: center;
            padding: 10px;
            
            width: 80%;
            height: 80%;
        


            display: flex;
            justify-content: center;
            align-items: center ;     
        }
    </STYLE>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
         

    </div>
</body>
</html>
